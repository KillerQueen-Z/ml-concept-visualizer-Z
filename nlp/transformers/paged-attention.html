<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagedAttention Interactive Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        canvas {
            background-color: #1e293b;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            height: auto;
            cursor: crosshair;
        }
        .btn {
            transition: all 0.2s ease;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #sandboxControls {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-5xl w-full flex flex-col gap-6">

        <!-- Header -->
        <div class="text-center">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                Understanding PagedAttention
            </h1>
            <p class="text-slate-400 text-lg">Interactive visualization of LLM KV Cache memory management.</p>
        </div>

        <!-- Main Content Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">

            <!-- Canvas Container (Left 2/3) -->
            <div class="lg:col-span-2 flex flex-col gap-4">
                <div class="relative">
                    <canvas id="simCanvas" width="800" height="450" class="w-full border border-slate-700"></canvas>
                    <!-- Sandbox Floating Control -->
                    <div id="sandboxControls" class="absolute top-4 left-4 flex gap-2">
                        <button id="btnGenToken" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-bold shadow-lg flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg> Generate Token
                        </button>
                        <button id="btnResetSandbox" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-bold shadow-lg">
                            Reset
                        </button>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <button id="btnBack" class="btn px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-semibold flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Back
                    </button>
                    <div class="flex items-center gap-4">
                        <div class="text-slate-300 font-mono tracking-widest text-sm font-bold" id="stepCounter">
                            STEP 1 / 7
                        </div>
                        <button id="btnReplay" class="text-slate-400 hover:text-white transition-colors" title="Replay Animation">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                    </div>
                    <button id="btnNext" class="btn px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-semibold flex items-center gap-2">
                        Next <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Text/Explanation Panel (Right 1/3) -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 h-full flex flex-col">
                <h2 id="stepTitle" class="text-2xl font-bold text-blue-400 mb-4 border-b border-slate-600 pb-2">Title</h2>
                <div id="stepDesc" class="text-slate-300 space-y-4 leading-relaxed flex-grow text-[15px]">
                    Description goes here.
                </div>

                <!-- Legend -->
                <div class="mt-6 pt-4 border-t border-slate-700">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Legend</h3>
                    <div class="grid grid-cols-2 gap-3 text-sm text-slate-300">
                        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-blue-500"></div> Request A</div>
                        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-emerald-500"></div> Request B</div>
                        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-cyan-500"></div> Shared Block</div>
                        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-rose-500/50 border border-rose-500"></div> Wasted / OOM</div>
                    </div>
                    <p class="mt-4 text-[10px] text-slate-500 italic">Tip: Hover over Logical Blocks to see mappings.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let currentStep = 0;
        let stepStartTime = 0;
        let animationId;

        // Mouse Interactivity State
        let mouseX = 0;
        let mouseY = 0;
        let hoveredBlockIdx = -1; // -1 means none

        // Sandbox State
        const sandboxState = {
            tokens: [],
            mappings: [], // logical block index -> physical block index
            availablePhysical: Array.from({length: 16}, (_, i) => i) // 16 physical blocks in our simplified view (8x8 grid with 4-cell blocks)
        };

        // UI Elements
        const btnBack = document.getElementById('btnBack');
        const btnNext = document.getElementById('btnNext');
        const btnReplay = document.getElementById('btnReplay');
        const btnGenToken = document.getElementById('btnGenToken');
        const btnResetSandbox = document.getElementById('btnResetSandbox');
        const sandboxControls = document.getElementById('sandboxControls');
        const stepTitle = document.getElementById('stepTitle');
        const stepDesc = document.getElementById('stepDesc');
        const stepCounter = document.getElementById('stepCounter');

        // Colors
        const colors = {
            grid: '#334155',
            gridBg: '#0f172a',
            text: '#f8fafc',
            reqA: '#3b82f6', // Blue
            reqB: '#10b981', // Emerald
            reqC: '#f59e0b', // Amber
            reqD: '#8b5cf6', // Purple
            wasted: 'rgba(244, 63, 94, 0.2)', // Rose transparent
            wastedStroke: '#f43f5e',
            shared: '#06b6d4' // Cyan
        };

        const gridX = 400;
        const gridY = 50;
        const cellSize = 40;
        const cols = 8;
        const rows = 8;

        const easeOutCubic = x => 1 - Math.pow(1 - x, 3);

        function drawRoundedRect(ctx, x, y, width, height, radius, fill, stroke, lineWidth = 2) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) { ctx.fillStyle = fill; ctx.fill(); }
            if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
        }

        function drawToken(ctx, x, y, color, label, alpha = 1) {
            ctx.globalAlpha = alpha;
            drawRoundedRect(ctx, x + 4, y + 4, cellSize - 8, cellSize - 8, 4, color, null);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, x + cellSize/2, y + cellSize/2);
            ctx.globalAlpha = 1;
        }

        function drawArrow(ctx, fromx, fromy, tox, toy, color = '#94a3b8', highlight = false) {
            const headlen = highlight ? 14 : 10;
            const dx = tox - fromx;
            const dy = toy - fromy;
            const angle = Math.atan2(dy, dx);

            if (highlight) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.lineWidth = 4;
            } else {
                ctx.lineWidth = 2;
            }

            ctx.beginPath();
            ctx.moveTo(fromx, fromy);
            ctx.lineTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
            ctx.strokeStyle = color;
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.lineWidth = 2;
        }

        function drawGrid(ctx, pagedMode = false, activeCells = 0, wastedCells = 0) {
            drawRoundedRect(ctx, gridX - 10, gridY - 30, cols * cellSize + 20, rows * cellSize + 40, 8, colors.gridBg, colors.grid);
            const totalCells = rows * cols;
            const activePct = Math.max(0, ((activeCells / totalCells) * 100)).toFixed(1);
            const wastedPct = Math.max(0, ((wastedCells / totalCells) * 100)).toFixed(1);
            ctx.font = '11px monospace';
            ctx.textAlign = 'right';
            ctx.fillStyle = '#10b981';
            ctx.fillText(`Active: ${activePct}%`, gridX + cols * cellSize, gridY - 12);
            ctx.fillStyle = colors.wastedStroke;
            ctx.fillText(`Wasted: ${wastedPct}%`, gridX + cols * cellSize - 90, gridY - 12);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '14px Inter';
            ctx.textAlign = 'center';
            ctx.fillText("Physical GPU Memory", gridX + (cols * cellSize)/2, gridY - 10);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(gridX + c * cellSize, gridY + r * cellSize, cellSize, cellSize);
                }
            }

            if (pagedMode) {
                for (let r = 0; r < rows; r++) {
                    for (let b = 0; b < cols / 4; b++) {
                        const blockId = r * 2 + b;
                        ctx.strokeStyle = '#64748b';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(gridX + b * 4 * cellSize, gridY + r * cellSize, 4 * cellSize, cellSize);
                        ctx.fillStyle = '#475569';
                        ctx.font = '10px monospace';
                        ctx.textAlign = 'left';
                        ctx.fillText(`Blk ${blockId}`, gridX + b * 4 * cellSize + 2, gridY + r * cellSize + 10);
                    }
                }
            }
        }

        function isMouseIn(x, y, w, h) {
            return mouseX >= x && mouseX <= x + w && mouseY >= y && mouseY <= y + h;
        }

        function drawMapping(ctx, startX, startY, phyBlockIdx, color, isHovered) {
            const row = Math.floor(phyBlockIdx / 2);
            const colIdx = phyBlockIdx % 2;
            const targetX = gridX + colIdx * 4 * cellSize;
            const targetY = gridY + row * cellSize;

            drawArrow(ctx, startX, startY, targetX - 5, targetY + cellSize/2, color, isHovered);

            if (isHovered) {
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(targetX, targetY, 4 * cellSize, cellSize);
            }
        }

        // --- STEP DEFINITIONS ---
        const steps = [
            {
                title: "1. The KV Cache Problem",
                desc: `<p>LLMs generate text one token at a time. The <strong>KV Cache</strong> saves previous states to avoid recalculation.</p><p>The right side represents Physical GPU Memory.</p>`,
                draw: (ctx, progress) => { drawGrid(ctx, false, 0, 0); }
            },
            {
                title: "2. Traditional Allocation",
                desc: `<p>Traditional systems allocate contiguous blocks based on <em>maximum</em> length. This causes <strong>Internal Fragmentation</strong> (wasted space).</p>`,
                draw: (ctx, progress) => {
                    const p = easeOutCubic(Math.min(1, progress * 1.5));
                    let tokens = Math.floor(p * 5);
                    let reserved = (progress > 0.1) ? 16 : 0;
                    drawGrid(ctx, false, tokens, reserved - tokens);
                    drawRoundedRect(ctx, 40, 100, 250, 80, 8, '#1e293b', colors.reqA);
                    ctx.fillStyle = colors.reqA; ctx.textAlign = 'left'; ctx.font = 'bold 16px Inter'; ctx.fillText("Request A (Max: 16)", 55, 125);
                    if (progress > 0.1) {
                        drawRoundedRect(ctx, gridX, gridY, cols * cellSize, cellSize, 4, null, colors.reqA, 2);
                        drawRoundedRect(ctx, gridX, gridY + cellSize, cols * cellSize, cellSize, 4, null, colors.reqA, 2);
                    }
                    for(let i=0; i<tokens; i++) drawToken(ctx, gridX + i*cellSize, gridY, colors.reqA, `A${i+1}`);
                    if (progress > 0.8) {
                        ctx.fillStyle = colors.wasted; ctx.fillRect(gridX + 5*cellSize, gridY, 3*cellSize, cellSize);
                        ctx.fillRect(gridX, gridY + cellSize, cols*cellSize, cellSize);
                        ctx.fillStyle = colors.wastedStroke; ctx.font = 'bold 14px Inter'; ctx.textAlign = 'center'; ctx.fillText("Wasted Space", gridX + cols*cellSize/2, gridY + cellSize*1.6);
                    }
                }
            },
            {
                title: "3. Out of Memory (OOM)",
                desc: `<p>Reserved but empty space makes the GPU look full. New requests are rejected even if physical space exists.</p>`,
                draw: (ctx, progress) => {
                    drawGrid(ctx, false, 21, 11);
                    const reqs = [{c: colors.reqA, r: 0, t: 5}, {c: colors.reqB, r: 2, t: 7}, {c: colors.reqC, r: 4, t: 3}, {c: colors.reqD, r: 6, t: 6}];
                    reqs.forEach(req => {
                        drawRoundedRect(ctx, gridX, gridY + req.r*cellSize, cols*cellSize, cellSize*2, 4, null, req.c, 2);
                        for(let i=0; i<req.t; i++) drawToken(ctx, gridX + (i%cols)*cellSize, gridY + (req.r + Math.floor(i/cols))*cellSize, req.c, `T`);
                        ctx.fillStyle = colors.wasted;
                        ctx.fillRect(gridX + (req.t%cols)*cellSize, gridY + (req.r + Math.floor(req.t/cols))*cellSize, (cols - (req.t%cols))*cellSize, cellSize);
                        if(req.t < cols) ctx.fillRect(gridX, gridY + (req.r+1)*cellSize, cols*cellSize, cellSize);
                    });
                    if (progress > 0.5) {
                        let slideP = easeOutCubic(Math.min(1, (progress-0.5)*2));
                        let curX = -200 + (240) * slideP;
                        drawRoundedRect(ctx, curX, 150, 250, 80, 8, '#1e293b', colors.wastedStroke, 3);
                        ctx.fillStyle = colors.wastedStroke; ctx.font = 'bold 16px Inter'; ctx.fillText("Request E: OOM", curX + 15, 195);
                    }
                }
            },
            {
                title: "4. Enter PagedAttention",
                desc: `<p>Inspired by Virtual Memory, we use fixed-size <strong>Blocks</strong> (here, 4 tokens). Allocation happens only when a block fills.</p>`,
                draw: (ctx, progress) => {
                    const p = easeOutCubic(Math.min(1, progress * 1.5));
                    let tokens = Math.floor(p * 4);
                    drawGrid(ctx, true, tokens, (progress > 0.1 ? 4 : 0) - tokens);
                    ctx.fillStyle = '#94a3b8'; ctx.font = '14px Inter'; ctx.textAlign = 'center'; ctx.fillText("Logical View", 140, gridY - 10);
                    drawRoundedRect(ctx, 40, 100, 200, 120, 8, '#1e293b', colors.reqA);
                    ctx.fillStyle = colors.reqA; ctx.fillText("Logical Req A", 140, 125);
                    const isHovered = isMouseIn(60, 140, 160, 60);
                    drawRoundedRect(ctx, 60, 140, 160, 60, 4, isHovered ? '#1e293b' : '#0f172a', isHovered ? colors.reqA : '#475569');
                    for(let i=0; i<tokens; i++) {
                        drawToken(ctx, 65 + i*(cellSize-5), 165, colors.reqA, `A${i+1}`);
                        drawToken(ctx, gridX + i*cellSize, gridY, colors.reqA, `A${i+1}`);
                    }
                    if (progress > 0.8) drawMapping(ctx, 220, 170, 0, colors.reqA, isHovered);
                }
            },
            {
                title: "5. Dynamic Allocation",
                desc: `<p>New blocks don't need to be adjacent. Logical Block 1 maps to a distant Physical Block. Fragmentation is minimized.</p>`,
                draw: (ctx, progress) => {
                    const p = easeOutCubic(Math.min(1, progress * 1.5));
                    let tokensNew = Math.floor(Math.min(1, Math.max(0, p - 0.2)) * 2);
                    drawGrid(ctx, true, 4 + tokensNew, 4 + (progress > 0.2 ? 4 : 0) - (4 + tokensNew));
                    ctx.fillStyle = '#94a3b8'; ctx.font = '14px Inter'; ctx.textAlign = 'center'; ctx.fillText("Logical View", 140, gridY - 10);
                    drawRoundedRect(ctx, 40, 80, 220, 180, 8, '#1e293b', colors.reqA);

                    const h0 = isMouseIn(60, 120, 180, 50);
                    drawRoundedRect(ctx, 60, 120, 180, 50, 4, h0 ? '#1e293b' : '#0f172a', h0 ? colors.reqA : '#475569');
                    for(let i=0; i<4; i++) {
                        drawToken(ctx, 65+i*35, 140, colors.reqA, `A${i+1}`);
                        drawToken(ctx, gridX+i*cellSize, gridY, colors.reqA, `A${i+1}`);
                    }
                    drawMapping(ctx, 240, 145, 0, '#475569', h0);

                    const h1 = progress > 0.2 && isMouseIn(60, 180, 180, 50);
                    if (progress > 0.2) {
                        drawRoundedRect(ctx, 60, 180, 180, 50, 4, h1 ? '#1e293b' : '#0f172a', h1 ? colors.reqA : '#475569');
                        if (tokensNew > 0) {
                            drawToken(ctx, 65, 200, colors.reqA, `A5`);
                            drawToken(ctx, gridX, gridY + 3*cellSize, colors.reqA, `A5`);
                            drawMapping(ctx, 240, 205, 6, colors.reqA, h1);
                        }
                    }
                }
            },
            {
                title: "6. Memory Sharing",
                desc: `<p>Multiple requests can point to the same physical block (e.g., shared System Prompt). This saves massive amounts of memory.</p>`,
                draw: (ctx, progress) => {
                    drawGrid(ctx, true, 9, 3);
                    ctx.fillStyle = '#94a3b8'; ctx.font = '14px Inter'; ctx.textAlign = 'center'; ctx.fillText("Logical View", 140, gridY - 10);

                    // Shared Physical
                    for(let i=0; i<4; i++) drawToken(ctx, gridX + i*cellSize, gridY, colors.shared, `P${i+1}`);

                    // Req A
                    const ha0 = isMouseIn(30, 110, 130, 40);
                    const ha1 = isMouseIn(30, 160, 130, 40);
                    drawRoundedRect(ctx, 20, 80, 150, 140, 8, '#1e293b', colors.reqA);
                    drawRoundedRect(ctx, 30, 110, 130, 40, 4, ha0 ? '#1e293b' : '#0f172a', colors.shared);
                    drawRoundedRect(ctx, 30, 160, 130, 40, 4, ha1 ? '#1e293b' : '#0f172a', colors.reqA);
                    if (progress > 0.3) {
                        drawToken(ctx, gridX + 4*cellSize, gridY + 2*cellSize, colors.reqA, `A1`);
                        drawToken(ctx, gridX + 5*cellSize, gridY + 2*cellSize, colors.reqA, `A2`);
                    }

                    // Req B
                    const hb0 = isMouseIn(30, 270, 130, 40);
                    const hb1 = isMouseIn(30, 320, 130, 40);
                    drawRoundedRect(ctx, 20, 240, 150, 140, 8, '#1e293b', colors.reqB);
                    drawRoundedRect(ctx, 30, 270, 130, 40, 4, hb0 ? '#1e293b' : '#0f172a', colors.shared);
                    drawRoundedRect(ctx, 30, 320, 130, 40, 4, hb1 ? '#1e293b' : '#0f172a', colors.reqB);
                    if (progress > 0.6) {
                        drawToken(ctx, gridX, gridY + 5*cellSize, colors.reqB, `B1`);
                        drawToken(ctx, gridX + cellSize, gridY + 5*cellSize, colors.reqB, `B2`);
                    }

                    if (progress > 0.8) {
                        drawMapping(ctx, 170, 130, 0, colors.shared, ha0);
                        drawMapping(ctx, 170, 290, 0, colors.shared, hb0);
                        drawMapping(ctx, 170, 180, 5, colors.reqA, ha1);
                        drawMapping(ctx, 170, 340, 10, colors.reqB, hb1);
                    }
                }
            },
            {
                title: "7. Sandbox Mode",
                desc: `<p>Try it yourself! Click <strong>Generate Token</strong> to watch how PagedAttention dynamically maps blocks to random physical slots.</p>`,
                draw: (ctx, progress) => {
                    const active = sandboxState.tokens.length;
                    const reserved = sandboxState.mappings.length * 4;
                    drawGrid(ctx, true, active, reserved - active);
                    ctx.fillStyle = '#94a3b8'; ctx.font = '14px Inter'; ctx.textAlign = 'center'; ctx.fillText("Logical Sandbox", 140, gridY - 10);

                    drawRoundedRect(ctx, 20, 80, 250, 350, 8, '#1e293b', colors.reqA);

                    sandboxState.mappings.forEach((phyIdx, logIdx) => {
                        const y = 100 + logIdx * 60;
                        const isH = isMouseIn(40, y, 200, 50);
                        drawRoundedRect(ctx, 40, y, 200, 50, 4, isH ? '#1e293b' : '#0f172a', isH ? colors.reqA : '#475569');
                        ctx.fillStyle = '#475569'; ctx.font = '9px monospace'; ctx.fillText(`Log Blk ${logIdx}`, 50, y+10);

                        // Tokens in this block
                        for(let i=0; i<4; i++) {
                            const tokenIdx = logIdx * 4 + i;
                            if (tokenIdx < sandboxState.tokens.length) {
                                drawToken(ctx, 50 + i*35, y + 15, colors.reqA, `S${tokenIdx+1}`);
                                // Draw in Physical
                                const row = Math.floor(phyIdx / 2);
                                const col = (phyIdx % 2) * 4 + i;
                                drawToken(ctx, gridX + col * cellSize, gridY + row * cellSize, colors.reqA, `S${tokenIdx+1}`);
                            }
                        }
                        drawMapping(ctx, 240, y + 25, phyIdx, colors.reqA, isH);
                    });

                    // Block Table UI
                    if (sandboxState.mappings.length > 0) {
                        drawRoundedRect(ctx, 280, 80, 100, 350, 8, '#1e293b', '#334155');
                        ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 10px Inter'; ctx.textAlign = 'center'; ctx.fillText("BLOCK TABLE", 330, 100);
                        sandboxState.mappings.forEach((phy, log) => {
                            ctx.fillStyle = colors.reqA; ctx.font = '9px monospace';
                            ctx.fillText(`L${log} → P${phy}`, 330, 125 + log*20);
                        });
                    }
                }
            }
        ];

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const progress = (Date.now() - stepStartTime) / 1000;
            steps[currentStep].draw(ctx, progress);
            animationId = requestAnimationFrame(render);
        }

        function updateUI() {
            stepTitle.innerHTML = steps[currentStep].title;
            stepDesc.innerHTML = steps[currentStep].desc;
            stepCounter.innerText = `STEP ${currentStep + 1} / ${steps.length}`;
            btnBack.disabled = currentStep === 0;
            sandboxControls.style.display = currentStep === 6 ? 'flex' : 'none';
            btnNext.innerHTML = currentStep === steps.length - 1 ? 'Restart <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>' : 'Next <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
        }

        function genToken() {
            if (sandboxState.tokens.length >= 16 * 4) return; // Full GPU
            sandboxState.tokens.push(true);
            const neededBlocks = Math.ceil(sandboxState.tokens.length / 4);
            if (neededBlocks > sandboxState.mappings.length) {
                // Pick random available physical block
                const randomIdx = Math.floor(Math.random() * sandboxState.availablePhysical.length);
                const block = sandboxState.availablePhysical.splice(randomIdx, 1)[0];
                sandboxState.mappings.push(block);
            }
        }

        function resetSandbox() {
            sandboxState.tokens = [];
            sandboxState.mappings = [];
            sandboxState.availablePhysical = Array.from({length: 16}, (_, i) => i);
        }

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        btnBack.addEventListener('click', () => { currentStep = Math.max(0, currentStep - 1); stepStartTime = Date.now(); updateUI(); });
        btnNext.addEventListener('click', () => { if (currentStep === steps.length-1) currentStep = 0; else currentStep++; stepStartTime = Date.now(); updateUI(); });
        btnReplay.addEventListener('click', () => { stepStartTime = Date.now(); });
        btnGenToken.addEventListener('click', genToken);
        btnResetSandbox.addEventListener('click', resetSandbox);

        stepStartTime = Date.now();
        updateUI();
        render();
    </script>
</body>
</html>
